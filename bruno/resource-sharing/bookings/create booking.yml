info:
  name: create booking
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/bookings
  headers:
    - name: x-user-id
      value: "2"
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "itemId": 1
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
